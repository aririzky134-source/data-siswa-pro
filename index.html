<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Biodata & Database Murid</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- SheetJS for Excel Import/Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        /* ==========================================================================
           DESIGN SYSTEM & VARIABLES
           ========================================================================== */
        :root {
            /* Colors */
            --bg-login: #0B0F19;
            --bg-admin: #121212;
            --surface: #1A1A1A;
            --surface-hover: #2A2A2A;
            --primary: #10B981;
            --primary-hover: #059669;
            --primary-glow: rgba(16, 185, 129, 0.3);
            --danger: #EF4444;
            --danger-hover: #DC2626;
            --text-main: #FFFFFF;
            --text-muted: #9CA3AF;
            --border: #27272A;
            --border-green: #2E7D32;
            
            /* Typography */
            --font-main: 'Inter', sans-serif;
            
            /* Layout & Spacing */
            --radius-md: 8px;
            --radius-lg: 16px;
            --radius-full: 9999px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ==========================================================================
           RESET & GLOBAL STYLES
           ========================================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-main);
        }

        body {
            background-color: var(--bg-admin);
            color: var(--text-main);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        button {
            cursor: pointer;
            border: none;
            outline: none;
            transition: var(--transition);
        }

        input, select, textarea {
            width: 100%;
            background: var(--bg-admin);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 12px 16px;
            border-radius: var(--radius-md);
            transition: var(--transition);
            font-size: 14px;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
            outline: none;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-admin); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* ==========================================================================
           UTILITY CLASSES
           ========================================================================== */
        .hidden { display: none !important; }
        .text-primary { color: var(--primary); }
        .text-danger { color: var(--danger); }
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            gap: 8px; padding: 10px 20px; border-radius: var(--radius-md);
            font-weight: 500; font-size: 14px; text-decoration: none;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); box-shadow: 0 4px 12px var(--primary-glow); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-main); }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { background: var(--danger-hover); }
        .btn-icon { padding: 8px; border-radius: var(--radius-full); background: transparent; color: var(--text-muted); }
        .btn-icon:hover { background: var(--surface-hover); color: var(--text-main); }

        /* ==========================================================================
           VIEW 1: LOGIN (Emerald Minimalist)
           ========================================================================== */
        #login-view {
            min-height: 100vh;
            background-color: var(--bg-login);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 20px;
        }

        .glow-bg {
            position: absolute; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(16,185,129,0.15) 0%, rgba(11,15,25,0) 70%);
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 0; pointer-events: none;
        }

        .login-box {
            background: rgba(31, 41, 55, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 400px;
            z-index: 1;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .login-header { text-align: center; margin-bottom: 32px; }
        .login-header h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        .login-header p { color: var(--text-muted); font-size: 14px; }

        .input-group { margin-bottom: 20px; position: relative; }
        .input-group i { position: absolute; left: 16px; top: 14px; color: var(--text-muted); }
        .input-group input { padding-left: 44px; background: rgba(0,0,0,0.2); border-color: rgba(255,255,255,0.1); }
        .input-group input:focus { background: rgba(0,0,0,0.4); }

        .btn-login { width: 100%; padding: 14px; font-size: 16px; margin-top: 10px; }
        .btn-login:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; box-shadow: none; transform: none; }

        /* ==========================================================================
           VIEW 2: DASHBOARD (Header-Driven Admin)
           ========================================================================== */
        .sticky-header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(18, 18, 18, 0.95); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border); padding: 0 24px;
            display: flex; align-items: center; justify-content: space-between; height: 70px;
        }

        .header-logo { display: flex; align-items: center; gap: 12px; font-size: 18px; font-weight: 700; }
        .header-logo i { color: var(--primary); font-size: 24px; }
        
        .header-nav { display: flex; gap: 32px; }
        .nav-item { color: var(--text-muted); text-decoration: none; font-weight: 500; font-size: 15px; transition: var(--transition); display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: var(--primary); }
        .nav-item:hover { color: var(--text-main); }

        .header-profile { display: flex; align-items: center; gap: 16px; }
        .user-info { text-align: right; }
        .user-name { font-size: 14px; font-weight: 600; }
        .user-role { font-size: 12px; color: var(--primary); }

        .container { max-width: 1400px; margin: 0 auto; padding: 32px 24px; }

        /* Stats Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 24px; margin-bottom: 32px; }
        .stat-card {
            background: var(--surface); border: 1px solid var(--border-green); border-radius: var(--radius-lg);
            padding: 24px; display: flex; align-items: center; justify-content: space-between;
        }
        .stat-info p { color: var(--text-muted); font-size: 14px; margin-bottom: 8px; }
        .stat-info h3 { font-size: 32px; font-weight: 700; color: var(--primary); }
        .stat-icon { width: 56px; height: 56px; border-radius: 50%; background: var(--primary-glow); color: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 24px; }

        /* Toolbar */
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 16px; }
        .search-box { position: relative; width: 300px; }
        .search-box i { position: absolute; left: 16px; top: 14px; color: var(--text-muted); }
        .search-box input { padding-left: 44px; background: var(--surface); border-color: var(--border); }
        .actions-group { display: flex; gap: 12px; }

        /* Table */
        .table-container {
            background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; text-align: left; min-width: 800px; }
        th, td { padding: 16px 24px; border-bottom: 1px solid var(--border); font-size: 14px; }
        th { background: rgba(0,0,0,0.2); color: var(--text-muted); font-weight: 500; white-space: nowrap; }
        tr:hover td { background: rgba(255,255,255,0.02); }
        
        /* Sticky First Column */
        th:first-child, td:first-child { position: sticky; left: 0; background: var(--surface); z-index: 10; border-right: 1px solid var(--border); }
        tr:hover td:first-child { background: var(--surface-hover); }

        .avatar { width: 40px; height: 40px; border-radius: var(--radius-full); object-fit: cover; background: var(--border); }
        .table-actions { display: flex; gap: 8px; }

        /* ==========================================================================
           MODALS
           ========================================================================== */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(4px);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; opacity: 0; visibility: hidden; transition: var(--transition);
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        
        .modal-content {
            background: var(--bg-admin); border: 1px solid var(--border); border-radius: var(--radius-lg);
            width: 100%; max-width: 700px; max-height: 90vh; overflow-y: auto;
            transform: translateY(20px) scale(0.95); transition: var(--transition);
        }
        .modal-overlay.active .modal-content { transform: translateY(0) scale(1); }

        .modal-header { padding: 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--bg-admin); z-index: 10;}
        .modal-header h2 { font-size: 18px; font-weight: 600; }
        .modal-body { padding: 24px; }
        .modal-footer { padding: 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 12px; position: sticky; bottom: 0; background: var(--bg-admin); z-index: 10;}

        /* Form Grid */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group.full-width { grid-column: span 2; }
        .form-group label { font-size: 13px; color: var(--text-muted); font-weight: 500; }
        
        /* View Modal Details */
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .detail-item { padding: 12px; background: var(--surface); border-radius: var(--radius-md); }
        .detail-label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
        .detail-value { font-size: 14px; font-weight: 500; }
        .detail-photo { width: 100px; height: 100px; border-radius: var(--radius-md); object-fit: cover; margin-bottom: 20px; }

        /* ==========================================================================
           TOAST NOTIFICATIONS & LOADING
           ========================================================================== */
        #toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 2000; display: flex; flex-direction: column; gap: 10px; }
        .toast {
            background: var(--surface); border-left: 4px solid var(--primary);
            color: white; padding: 16px 24px; border-radius: var(--radius-md);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 12px;
            transform: translateX(120%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .toast.show { transform: translateX(0); }
        .toast.error { border-left-color: var(--danger); }
        .toast i { font-size: 20px; }
        .toast.error i { color: var(--danger); }
        .toast:not(.error) i { color: var(--primary); }

        .global-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 15, 25, 0.9); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .spinner {
            width: 40px; height: 40px; border: 3px solid rgba(16, 185, 129, 0.2);
            border-top-color: var(--primary); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .empty-state i { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }

        /* ==========================================================================
           RESPONSIVE & PRINT MEDIA
           ========================================================================== */
        @media (max-width: 768px) {
            .header-nav { display: none; /* In real app, make bottom nav */ }
            .user-info { display: none; }
            .form-grid, .detail-grid { grid-template-columns: 1fr; }
            .form-group.full-width { grid-column: span 1; }
            .toolbar { flex-direction: column; align-items: stretch; }
            .search-box { width: 100%; }
            .actions-group { justify-content: space-between; }
            .actions-group .btn { flex: 1; }
        }

        @media print {
            body * { visibility: hidden; }
            .table-container, .table-container * { visibility: visible; }
            .table-container { position: absolute; left: 0; top: 0; width: 100%; border: none; box-shadow: none; }
            th, td { color: black; border-color: #ccc; }
            th { background: #eee !important; -webkit-print-color-adjust: exact; }
            .table-actions { display: none; }
        }
    </style>
</head>
<body>

    <!-- LOADING SCREEN -->
    <div id="global-loader" class="global-loader hidden">
        <div class="spinner"></div>
        <p>Memproses data...</p>
    </div>

    <!-- VIEW 1: LOGIN -->
    <div id="login-view">
        <div class="glow-bg"></div>
        <div class="login-box">
            <div class="login-header">
                <h1>Input Data Siswa</h1>
                <p>Silakan masuk menggunakan kredensial Anda</p>
            </div>
            <form id="login-form">
                <div class="input-group">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="login-name" placeholder="Nama Lengkap" required autocomplete="off">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="login-email" placeholder="Alamat Email" required autocomplete="email">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-key"></i>
                    <input type="password" id="login-code" placeholder="Masukkan Kode Akses" required>
                </div>
                <button type="submit" class="btn btn-primary btn-login" id="btn-login-submit" disabled>
                    Klik disini cikgu! <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- VIEW 2: DASHBOARD -->
    <div id="dashboard-view" class="hidden">
        <header class="sticky-header">
            <div class="header-logo">
                <i class="fa-solid fa-database"></i> EduBase
            </div>
            <nav class="header-nav">
                <a href="#" class="nav-item active"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
            </nav>
            <div class="header-profile">
                <div class="user-info">
                    <div class="user-name" id="display-user-name">Nama Guru</div>
                    <div class="user-role" id="display-user-email">email@sekolah.com</div>
                </div>
                <button class="btn btn-outline" style="padding: 8px 16px;" onclick="app.logout()">
                    <i class="fa-solid fa-power-off"></i>
                </button>
            </div>
        </header>

        <main class="container">
            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-info">
                        <p>Total Murid</p>
                        <h3 id="stat-total">0</h3>
                    </div>
                    <div class="stat-icon"><i class="fa-solid fa-users"></i></div>
                </div>
                <div class="stat-card">
                    <div class="stat-info">
                        <p>Laki-Laki</p>
                        <h3 id="stat-male">0</h3>
                    </div>
                    <div class="stat-icon" style="color: #3B82F6; background: rgba(59,130,246,0.1);"><i class="fa-solid fa-mars"></i></div>
                </div>
                <div class="stat-card">
                    <div class="stat-info">
                        <p>Perempuan</p>
                        <h3 id="stat-female">0</h3>
                    </div>
                    <div class="stat-icon" style="color: #EC4899; background: rgba(236,72,153,0.1);"><i class="fa-solid fa-venus"></i></div>
                </div>
            </div>

            <!-- Toolbar -->
            <div class="toolbar">
                <div class="search-box">
                    <i class="fa-solid fa-search"></i>
                    <input type="text" id="search-input" placeholder="Cari nama, NIS, atau NISN...">
                </div>
                <div class="actions-group">
                    <label class="btn btn-outline" style="cursor: pointer;">
                        <i class="fa-solid fa-file-import"></i> Import Excel
                        <input type="file" id="import-file" accept=".xlsx, .xls" class="hidden">
                    </label>
                    <button class="btn btn-outline" onclick="app.exportExcel()">
                        <i class="fa-solid fa-file-export"></i> Export Excel
                    </button>
                    <button class="btn btn-primary" onclick="app.openFormModal()">
                        <i class="fa-solid fa-plus"></i> Tambah Murid
                    </button>
                </div>
            </div>

            <!-- Table -->
            <div class="table-container">
                <table id="data-table">
                    <thead>
                        <tr>
                            <th>Nama Lengkap</th>
                            <th>NIS</th>
                            <th>L/P</th>
                            <th>No HP Ortu</th>
                            <th style="text-align: right;">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Data will be rendered here -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- MODAL: FORM (ADD/EDIT) -->
    <div id="modal-form" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-form-title">Tambah Data Murid</h2>
                <button class="btn-icon" onclick="app.closeModal('modal-form')"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <form id="student-form">
                    <input type="hidden" id="form-id">
                    <div class="form-grid">
                        <div class="form-group full-width">
                            <label>Foto Murid (Pilih File)</label>
                            <input type="file" id="form-photo-file" accept="image/*">
                            <input type="hidden" id="form-photo-base64">
                            <small class="text-muted" style="font-size: 11px;">Maksimal ukuran otomatis dikompres menjadi kecil.</small>
                        </div>
                        <div class="form-group">
                            <label>Nama Lengkap *</label>
                            <input type="text" id="form-name" required>
                        </div>
                        <div class="form-group">
                            <label>Jenis Kelamin *</label>
                            <select id="form-gender" required>
                                <option value="">Pilih...</option>
                                <option value="L">Laki-Laki (L)</option>
                                <option value="P">Perempuan (P)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>NIS *</label>
                            <input type="number" id="form-nis" required>
                        </div>
                        <div class="form-group">
                            <label>NISN</label>
                            <input type="number" id="form-nisn">
                        </div>
                        <div class="form-group">
                            <label>Tempat Lahir</label>
                            <input type="text" id="form-birthplace">
                        </div>
                        <div class="form-group">
                            <label>Tanggal Lahir</label>
                            <input type="date" id="form-birthdate">
                        </div>
                        <div class="form-group">
                            <label>Agama</label>
                            <select id="form-religion">
                                <option value="Islam">Islam</option>
                                <option value="Kristen">Kristen</option>
                                <option value="Katolik">Katolik</option>
                                <option value="Hindu">Hindu</option>
                                <option value="Buddha">Buddha</option>
                                <option value="Konghucu">Konghucu</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>No HP Murid</label>
                            <input type="text" id="form-phone">
                        </div>
                        <div class="form-group full-width">
                            <label>Alamat Lengkap</label>
                            <textarea id="form-address" rows="2"></textarea>
                        </div>
                        <div class="form-group">
                            <label>Nama Ayah</label>
                            <input type="text" id="form-father">
                        </div>
                        <div class="form-group">
                            <label>Nama Ibu</label>
                            <input type="text" id="form-mother">
                        </div>
                        <div class="form-group">
                            <label>Pekerjaan Ayah</label>
                            <input type="text" id="form-jobfather">
                        </div>
                        <div class="form-group">
                            <label>Pekerjaan Ibu</label>
                            <input type="text" id="form-jobmother">
                        </div>
                        <div class="form-group">
                            <label>No HP Orang Tua/Wali *</label>
                            <input type="text" id="form-parentphone" required>
                        </div>
                        <div class="form-group">
                            <label>Status Tinggal</label>
                            <select id="form-living">
                                <option value="Bersama Orang Tua">Bersama Orang Tua</option>
                                <option value="Asrama/Kos">Asrama/Kos</option>
                                <option value="Bersama Wali">Bersama Wali</option>
                            </select>
                        </div>
                        <div class="form-group full-width">
                            <label>Catatan Tambahan</label>
                            <textarea id="form-notes" rows="2"></textarea>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="app.closeModal('modal-form')">Batal</button>
                <button class="btn btn-primary" onclick="app.saveData()">Simpan Data</button>
            </div>
        </div>
    </div>

    <!-- MODAL: VIEW DETAILS -->
    <div id="modal-view" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Detail Biodata Murid</h2>
                <div>
                    <button class="btn-icon" onclick="window.print()" title="Cetak PDF"><i class="fa-solid fa-print"></i></button>
                    <button class="btn-icon" onclick="app.closeModal('modal-view')"><i class="fa-solid fa-xmark"></i></button>
                </div>
            </div>
            <div class="modal-body" id="view-body">
                <!-- Content injected via JS -->
            </div>
        </div>
    </div>

    <!-- TOAST CONTAINER -->
    <div id="toast-container"></div>

    <script>
        /* ==========================================================================
           APP CONFIGURATION & STATE
           ========================================================================== */
        const CONFIG = {
            // PENTING: Ganti dengan URL Web App Google Apps Script Anda nanti
            GAS_URL: 'https://script.google.com/macros/s/AKfycbzz51mzKuU0WaoV2jkrh2p80V0EeswbHd2ObyrldM96MpWwkaBAo270wV55_PbihWBc/exec', 
            ACCESS_CODE: 'TCA2026'
        };

        const state = {
            user: null,
            students: [],
            filteredStudents: []
        };

        /* ==========================================================================
           UTILITIES (UI, Notifications, Image Resize)
           ========================================================================== */
        const ui = {
            showLoader: () => document.getElementById('global-loader').classList.remove('hidden'),
            hideLoader: () => document.getElementById('global-loader').classList.add('hidden'),
            
            toast: (message, type = 'success') => {
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
                toast.innerHTML = `<i class="fa-solid ${icon}"></i> <span>${message}</span>`;
                
                container.appendChild(toast);
                setTimeout(() => toast.classList.add('show'), 10);
                
                setTimeout(() => {
                    toast.classList.remove('show');
                    setTimeout(() => toast.remove(), 300);
                }, 3000);
            },

            // Resize image to base64 to save database space
            resizeImage: (file, maxSize = 200) => {
                return new Promise((resolve) => {
                    if (!file) return resolve('');
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            let width = img.width;
                            let height = img.height;
                            if (width > height) {
                                if (width > maxSize) { height *= maxSize / width; width = maxSize; }
                            } else {
                                if (height > maxSize) { width *= maxSize / height; height = maxSize; }
                            }
                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            resolve(canvas.toDataURL('image/jpeg', 0.7));
                        };
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                });
            }
        };

        /* ==========================================================================
           MAIN APPLICATION LOGIC
           ========================================================================== */
        const app = {
            init: () => {
                app.checkSession();
                app.setupLoginListeners();
                app.setupSearchListener();
                app.setupFileImport();
            },

            checkSession: () => {
                const storedUser = localStorage.getItem('edubase_user');
                if (storedUser) {
                    state.user = JSON.parse(storedUser);
                    app.showDashboard();
                }
            },

            setupLoginListeners: () => {
                const form = document.getElementById('login-form');
                const inputs = form.querySelectorAll('input');
                const btn = document.getElementById('btn-login-submit');

                inputs.forEach(input => {
                    input.addEventListener('input', () => {
                        const allFilled = Array.from(inputs).every(i => i.value.trim() !== '');
                        btn.disabled = !allFilled;
                    });
                });

                form.addEventListener('submit', (e) => {
                    e.preventDefault();
                    const name = document.getElementById('login-name').value.trim();
                    const email = document.getElementById('login-email').value.trim();
                    const code = document.getElementById('login-code').value.trim();

                    // Security & Validation
                    if (code !== CONFIG.ACCESS_CODE) {
                        ui.toast('Kode Akses salah!', 'error');
                        return;
                    }

                    // Create User Session ID (encode email safely for Firebase Path)
                    const userId = email.replace(/[\.\#\$\[\]]/g, '_');
                    
                    state.user = { name, email, userId };
                    localStorage.setItem('edubase_user', JSON.stringify(state.user));
                    
                    ui.toast(`Selamat datang, ${name}!`);
                    app.showDashboard();
                });
            },

            logout: () => {
                localStorage.removeItem('edubase_user');
                state.user = null;
                document.getElementById('dashboard-view').classList.add('hidden');
                document.getElementById('login-view').classList.remove('hidden');
                document.getElementById('login-form').reset();
            },

            showDashboard: () => {
                document.getElementById('login-view').classList.add('hidden');
                document.getElementById('dashboard-view').classList.remove('hidden');
                
                document.getElementById('display-user-name').innerText = state.user.name;
                document.getElementById('display-user-email').innerText = state.user.email;
                
                app.fetchData();
            },

            /* --- API COMMUNICATION --- */
            api: async (payload) => {
                try {
                    // Inject userId into all requests for Multi-User separation
                    payload.userId = state.user.userId;
                    
                    // --- MOCK BACKEND (Mode Preview) ---
                    // Jika URL belum diganti, gunakan mode simulasi (Local Storage)
                    if (CONFIG.GAS_URL.includes('XXXXXXXXXXXX')) {
                        console.warn("Menggunakan Mode Simulasi (Local Storage) karena GAS_URL belum diatur.");
                        return await app.mockApi(payload);
                    }
                    // -----------------------------------

                    const response = await fetch(CONFIG.GAS_URL, {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });
                    
                    const result = await response.json();
                    if (!result.success) throw new Error(result.error || 'Terjadi kesalahan server');
                    return result.data;
                } catch (error) {
                    console.error("API Error:", error);
                    const errorMsg = error.message === 'Failed to fetch' 
                        ? 'Koneksi gagal. Pastikan URL Google Apps Script sudah benar.' 
                        : error.message;
                    ui.toast(errorMsg, 'error');
                    throw error;
                }
            },

            // Fitur simulasi backend agar aplikasi bisa dicoba langsung di layar preview
            mockApi: async (payload) => {
                return new Promise((resolve, reject) => {
                    setTimeout(() => { // Simulasi delay server 0.6 detik
                        const dbKey = `edubase_mockdb_${payload.userId}`;
                        let db = JSON.parse(localStorage.getItem(dbKey) || '{}');
                        
                        if (payload.action === 'read') resolve(db);
                        else if (payload.action === 'create' || payload.action === 'update') {
                            db[payload.data.id] = payload.data;
                            localStorage.setItem(dbKey, JSON.stringify(db));
                            resolve(payload.data);
                        } 
                        else if (payload.action === 'delete') {
                            delete db[payload.id];
                            localStorage.setItem(dbKey, JSON.stringify(db));
                            resolve({ success: true });
                        }
                        else if (payload.action === 'import_batch') {
                            db = { ...db, ...payload.data };
                            localStorage.setItem(dbKey, JSON.stringify(db));
                            resolve({ success: true });
                        } else {
                            reject(new Error("Aksi mock tidak dikenal"));
                        }
                    }, 600);
                });
            },

            fetchData: async () => {
                ui.showLoader();
                try {
                    const data = await app.api({ action: 'read' });
                    // Convert object map from Firebase to Array
                    state.students = data ? Object.keys(data).map(key => ({ id: key, ...data[key] })) : [];
                    state.filteredStudents = [...state.students];
                    app.renderTable();
                    app.updateStats();
                } catch (e) {
                    // Error handled in api()
                } finally {
                    ui.hideLoader();
                }
            },

            /* --- UI RENDERING --- */
            renderTable: () => {
                const tbody = document.getElementById('table-body');
                tbody.innerHTML = '';

                if (state.filteredStudents.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5">
                        <div class="empty-state">
                            <i class="fa-solid fa-folder-open"></i>
                            <p>Belum ada data murid ditemukan.</p>
                        </div>
                    </td></tr>`;
                    return;
                }

                state.filteredStudents.forEach(s => {
                    const tr = document.createElement('tr');
                    
                    const photoHtml = s.photo ? `<img src="${s.photo}" class="avatar">` : `<div class="avatar" style="display:flex;align-items:center;justify-content:center;background:var(--primary-glow);color:var(--primary);"><i class="fa-solid fa-user"></i></div>`;

                    tr.innerHTML = `
                        <td style="display:flex;align-items:center;gap:12px;">
                            ${photoHtml}
                            <span style="font-weight:600;">${s.name}</span>
                        </td>
                        <td>${s.nis || '-'}</td>
                        <td>${s.gender === 'L' ? '<span class="text-primary">L</span>' : '<span style="color:#EC4899">P</span>'}</td>
                        <td>${s.parentPhone || '-'}</td>
                        <td style="text-align: right;">
                            <div class="table-actions" style="justify-content: flex-end;">
                                <button class="btn-icon" onclick="app.viewData('${s.id}')" title="Lihat"><i class="fa-solid fa-eye"></i></button>
                                <button class="btn-icon" onclick="app.openFormModal('${s.id}')" title="Edit"><i class="fa-solid fa-pen"></i></button>
                                <button class="btn-icon text-danger" onclick="app.deleteData('${s.id}')" title="Hapus"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            },

            updateStats: () => {
                const total = state.students.length;
                const male = state.students.filter(s => s.gender === 'L').length;
                const female = state.students.filter(s => s.gender === 'P').length;
                
                document.getElementById('stat-total').innerText = total;
                document.getElementById('stat-male').innerText = male;
                document.getElementById('stat-female').innerText = female;
            },

            setupSearchListener: () => {
                document.getElementById('search-input').addEventListener('input', (e) => {
                    const keyword = e.target.value.toLowerCase();
                    state.filteredStudents = state.students.filter(s => 
                        (s.name || '').toLowerCase().includes(keyword) || 
                        (s.nis || '').toLowerCase().includes(keyword) ||
                        (s.nisn || '').toLowerCase().includes(keyword)
                    );
                    app.renderTable();
                });
            },

            /* --- CRUD OPERATIONS --- */
            openFormModal: (id = null) => {
                document.getElementById('student-form').reset();
                document.getElementById('form-photo-base64').value = '';
                
                if (id) {
                    document.getElementById('modal-form-title').innerText = 'Edit Data Murid';
                    const s = state.students.find(x => x.id === id);
                    document.getElementById('form-id').value = s.id;
                    document.getElementById('form-name').value = s.name || '';
                    document.getElementById('form-gender').value = s.gender || '';
                    document.getElementById('form-nis').value = s.nis || '';
                    document.getElementById('form-nisn').value = s.nisn || '';
                    document.getElementById('form-birthplace').value = s.birthplace || '';
                    document.getElementById('form-birthdate').value = s.birthdate || '';
                    document.getElementById('form-religion').value = s.religion || 'Islam';
                    document.getElementById('form-phone').value = s.phone || '';
                    document.getElementById('form-address').value = s.address || '';
                    document.getElementById('form-father').value = s.father || '';
                    document.getElementById('form-mother').value = s.mother || '';
                    document.getElementById('form-jobfather').value = s.jobfather || '';
                    document.getElementById('form-jobmother').value = s.jobmother || '';
                    document.getElementById('form-parentphone').value = s.parentPhone || '';
                    document.getElementById('form-living').value = s.living || 'Bersama Orang Tua';
                    document.getElementById('form-notes').value = s.notes || '';
                    document.getElementById('form-photo-base64').value = s.photo || '';
                } else {
                    document.getElementById('modal-form-title').innerText = 'Tambah Data Murid';
                    document.getElementById('form-id').value = '';
                }
                
                document.getElementById('modal-form').classList.add('active');
            },

            closeModal: (modalId) => {
                document.getElementById(modalId).classList.remove('active');
            },

            saveData: async () => {
                const form = document.getElementById('student-form');
                if (!form.checkValidity()) {
                    form.reportValidity();
                    return;
                }

                ui.showLoader();
                
                // Handle image processing if new file uploaded
                const fileInput = document.getElementById('form-photo-file');
                if (fileInput.files.length > 0) {
                    const base64 = await ui.resizeImage(fileInput.files[0]);
                    document.getElementById('form-photo-base64').value = base64;
                }

                const id = document.getElementById('form-id').value;
                
                // Sanitize basic inputs (XSS protection measure)
                const sanitize = (str) => str ? str.replace(/</g, "&lt;").replace(/>/g, "&gt;") : '';

                const data = {
                    name: sanitize(document.getElementById('form-name').value),
                    gender: document.getElementById('form-gender').value,
                    nis: sanitize(document.getElementById('form-nis').value),
                    nisn: sanitize(document.getElementById('form-nisn').value),
                    birthplace: sanitize(document.getElementById('form-birthplace').value),
                    birthdate: document.getElementById('form-birthdate').value,
                    religion: document.getElementById('form-religion').value,
                    phone: sanitize(document.getElementById('form-phone').value),
                    address: sanitize(document.getElementById('form-address').value),
                    father: sanitize(document.getElementById('form-father').value),
                    mother: sanitize(document.getElementById('form-mother').value),
                    jobfather: sanitize(document.getElementById('form-jobfather').value),
                    jobmother: sanitize(document.getElementById('form-jobmother').value),
                    parentPhone: sanitize(document.getElementById('form-parentphone').value),
                    living: document.getElementById('form-living').value,
                    notes: sanitize(document.getElementById('form-notes').value),
                    photo: document.getElementById('form-photo-base64').value, // Kept for image
                    updatedAt: new Date().toISOString()
                };

                try {
                    if (id) {
                        data.id = id;
                        await app.api({ action: 'update', data: data });
                        ui.toast('Data berhasil diupdate!');
                    } else {
                        // Generate unique ID
                        data.id = 'STD_' + Date.now();
                        await app.api({ action: 'create', data: data });
                        ui.toast('Data murid baru berhasil ditambahkan!');
                    }
                    
                    app.closeModal('modal-form');
                    app.fetchData(); // Refresh table
                } catch (e) {
                    // Handled in api()
                    ui.hideLoader();
                }
            },

            viewData: (id) => {
                const s = state.students.find(x => x.id === id);
                if (!s) return;

                const body = document.getElementById('view-body');
                
                const photoSrc = s.photo || 'https://via.placeholder.com/150/1A1A1A/FFFFFF?text=No+Photo';
                
                body.innerHTML = `
                    <div style="text-align: center;">
                        <img src="${photoSrc}" class="detail-photo">
                        <h3 style="font-size: 20px; font-weight: 700; margin-bottom: 24px;">${s.name}</h3>
                    </div>
                    <div class="detail-grid">
                        <div class="detail-item"><div class="detail-label">NIS / NISN</div><div class="detail-value">${s.nis || '-'} / ${s.nisn || '-'}</div></div>
                        <div class="detail-item"><div class="detail-label">Jenis Kelamin</div><div class="detail-value">${s.gender === 'L' ? 'Laki-Laki' : (s.gender === 'P' ? 'Perempuan' : '-')}</div></div>
                        <div class="detail-item"><div class="detail-label">Tempat, Tgl Lahir</div><div class="detail-value">${s.birthplace || '-'}, ${s.birthdate || '-'}</div></div>
                        <div class="detail-item"><div class="detail-label">Agama</div><div class="detail-value">${s.religion || '-'}</div></div>
                        <div class="detail-item"><div class="detail-label">No HP Murid</div><div class="detail-value">${s.phone || '-'}</div></div>
                        <div class="detail-item"><div class="detail-label">Status Tinggal</div><div class="detail-value">${s.living || '-'}</div></div>
                        <div class="detail-item" style="grid-column: span 2;"><div class="detail-label">Alamat Lengkap</div><div class="detail-value">${s.address || '-'}</div></div>
                        
                        <div class="detail-item"><div class="detail-label">Nama Ayah / Pekerjaan</div><div class="detail-value">${s.father || '-'} / ${s.jobfather || '-'}</div></div>
                        <div class="detail-item"><div class="detail-label">Nama Ibu / Pekerjaan</div><div class="detail-value">${s.mother || '-'} / ${s.jobmother || '-'}</div></div>
                        <div class="detail-item" style="grid-column: span 2;"><div class="detail-label">No HP Orang Tua / Wali</div><div class="detail-value text-primary">${s.parentPhone || '-'}</div></div>
                        
                        <div class="detail-item" style="grid-column: span 2;"><div class="detail-label">Catatan Tambahan</div><div class="detail-value">${s.notes || '-'}</div></div>
                    </div>
                `;
                document.getElementById('modal-view').classList.add('active');
            },

            deleteData: async (id) => {
                if(confirm('Apakah Anda yakin ingin menghapus data murid ini? Tindakan ini tidak dapat dibatalkan.')) {
                    ui.showLoader();
                    try {
                        await app.api({ action: 'delete', id: id });
                        ui.toast('Data berhasil dihapus');
                        app.fetchData();
                    } catch (e) {
                        ui.hideLoader();
                    }
                }
            },

            /* --- EXPORT & IMPORT (using SheetJS) --- */
            exportExcel: () => {
                if (state.students.length === 0) {
                    ui.toast('Tidak ada data untuk diexport', 'error');
                    return;
                }
                
                // Clean data before export (remove base64 photo to prevent excel crash)
                const exportData = state.students.map(s => {
                    const clone = { ...s };
                    delete clone.photo; 
                    delete clone.id;
                    return clone;
                });

                const ws = XLSX.utils.json_to_sheet(exportData);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Data Murid");
                XLSX.writeFile(wb, `Data_Murid_${state.user.name}_${new Date().toISOString().split('T')[0]}.xlsx`);
            },

            setupFileImport: () => {
                document.getElementById('import-file').addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (!file) return;

                    ui.showLoader();
                    const reader = new FileReader();
                    reader.onload = async (evt) => {
                        try {
                            const bstr = evt.target.result;
                            const wb = XLSX.read(bstr, { type: 'binary' });
                            const wsname = wb.SheetNames[0];
                            const ws = wb.Sheets[wsname];
                            const rawData = XLSX.utils.sheet_to_json(ws);

                            if(rawData.length === 0) throw new Error("File Excel Kosong!");

                            // Formatting data & ID assignment
                            const newStudents = {};
                            rawData.forEach(item => {
                                const id = 'STD_' + Date.now() + Math.floor(Math.random()*1000);
                                newStudents[id] = {
                                    id: id,
                                    name: item.name || item.Nama || item['Nama Lengkap'] || 'Tanpa Nama',
                                    nis: item.nis || item.NIS || '',
                                    gender: item.gender || item['Jenis Kelamin'] || 'L',
                                    parentPhone: item.parentPhone || item['No HP Ortu'] || '',
                                    // Add defaults for other fields to prevent undefined
                                    updatedAt: new Date().toISOString()
                                };
                            });

                            // Send batch upload using 'update' logic on root
                            await app.api({ action: 'import_batch', data: newStudents });
                            
                            ui.toast(`${rawData.length} Data berhasil diimport!`);
                            app.fetchData();
                        } catch (error) {
                            ui.toast('Gagal membaca file Excel. Pastikan format benar.', 'error');
                            console.error(error);
                        } finally {
                            document.getElementById('import-file').value = ''; // Reset
                            ui.hideLoader();
                        }
                    };
                    reader.readAsBinaryString(file);
                });
            }
        };

        // Initialize App
        window.onload = app.init;
    </script>
</body>
</html>
